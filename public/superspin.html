<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Spin - Rattenfest 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }

        #superspin-canvas { position: fixed; inset: 0; display: block; width: 100%; height: 100%; }

        #superspin-result-overlay {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10; pointer-events: none;
            opacity: 0; transition: opacity 0.4s ease;
        }
        #superspin-result-overlay.visible { opacity: 1; }

        #superspin-result-inner {
            text-align: center;
            transform: scale(0.4) translateY(40px);
            transition: transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #superspin-result-overlay.visible #superspin-result-inner {
            transform: scale(1) translateY(0);
        }

        #superspin-result-won {
            font-size: clamp(22px, 3vw, 44px);
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 16px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.9);
        }
        #superspin-result-label {
            font-size: clamp(96px, 20vw, 280px);
            font-weight: 900;
            line-height: 1;
            /* Strong glow in the field colour + thick black stroke for contrast */
            text-shadow:
                0 0 30px currentColor,
                0 0 80px currentColor,
                0 0 160px currentColor,
                0 4px 20px rgba(0,0,0,0.95);
            -webkit-text-stroke: 4px #000000;
            paint-order: stroke fill;
        }
    </style>
</head>

<body>
    <canvas id="superspin-canvas"></canvas>

    <div id="superspin-result-overlay">
        <div id="superspin-result-inner">
            <div id="superspin-result-won">Du gewinnst</div>
            <div id="superspin-result-label"></div>
        </div>
    </div>

    <script type="module" src="/js/superspin.js"></script>
</body>

</html>
