<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fortune Wheel - Rattenfest 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050d1f;
            font-family: 'Inter', sans-serif;
        }

        #wheel-canvas {
            display: block;
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
        }

        /* Result overlay */
        #result-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: rgba(0, 0, 0, 0);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #result-overlay.visible {
            opacity: 1;
            background: rgba(0, 0, 0, 0.72);
        }

        #result-inner {
            text-align: center;
            transform: scale(0.4) translateY(40px);
            transition: transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #result-overlay.visible #result-inner {
            transform: scale(1) translateY(0);
        }

        #result-won {
            font-size: clamp(18px, 2.5vw, 36px);
            font-weight: 700;
            color: #e2e8f0;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 12px;
            opacity: 0.85;
        }

        #result-label {
            font-size: clamp(72px, 16vw, 220px);
            font-weight: 900;
            line-height: 1;
            text-shadow: 0 0 40px currentColor, 0 0 100px currentColor, 0 0 160px currentColor;
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.25);
            filter: drop-shadow(0 4px 24px rgba(0,0,0,0.6));
        }
    </style>
</head>

<body>
    <canvas id="wheel-canvas"></canvas>

    <div id="result-overlay">
        <div id="result-inner">
            <div id="result-won">You won</div>
            <div id="result-label"></div>
        </div>
    </div>

    <script type="module" src="/js/spin.js"></script>
</body>

</html>
