<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fortune Wheel - Rattenfest 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #050d1f; font-family: 'Inter', sans-serif; }

        /* ── Overlay (always active in standalone mode) ─────────────────── */
        #wheel-overlay {
            position: fixed; inset: 0; z-index: 1000; pointer-events: all;
            background: rgba(5, 13, 31, 1);
        }
        #wheel-canvas { position: absolute; inset: 0; display: block; }

        #spin-device-badge {
            position: absolute; top: 22px; right: 22px;
            display: flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.65); border: 1px solid rgba(255,255,255,0.18);
            border-radius: 40px; padding: 8px 20px 8px 14px;
            font-size: 1rem; font-weight: 600; color: #e2e8f0;
        }
        #spin-device-badge .badge-dot {
            width: 10px; height: 10px; border-radius: 50%; background: #48bb78;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(72, 187, 120, 0.5); }
            50% { box-shadow: 0 0 0 5px rgba(72, 187, 120, 0); }
        }

        #spin-result-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
            pointer-events: none; opacity: 0; transition: opacity 0.4s ease;
        }
        #spin-result-overlay.visible { opacity: 1; }
        #spin-result-inner {
            text-align: center; transform: scale(0.4) translateY(40px);
            transition: transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #spin-result-overlay.visible #spin-result-inner { transform: scale(1) translateY(0); }
        #spin-result-won {
            font-size: clamp(18px, 2.5vw, 36px); font-weight: 700;
            color: #e2e8f0; letter-spacing: 0.25em; text-transform: uppercase;
            margin-bottom: 12px; opacity: 0.85;
        }
        #spin-result-label {
            font-size: clamp(72px, 16vw, 220px); font-weight: 900; line-height: 1;
            text-shadow: 0 0 40px currentColor, 0 0 100px currentColor;
            -webkit-text-stroke: 2px rgba(255,255,255,0.25);
        }
    </style>
</head>

<body>
    <div id="wheel-overlay" class="active">
        <canvas id="wheel-canvas"></canvas>

        <div id="spin-device-badge" style="display:none">
            <span class="badge-dot"></span>
            Device #<span id="spin-device-id"></span>
        </div>

        <div id="spin-result-overlay">
            <div id="spin-result-inner">
                <div id="spin-result-won">Du gewinnst</div>
                <div id="spin-result-label"></div>
            </div>
        </div>
    </div>

    <script type="module" src="/js/spin.js"></script>
</body>

</html>
